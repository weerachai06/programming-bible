# Codecov Configuration for Monorepo
# This configuration targets only the nextjs directory

coverage:
  status:
      patch: off # disable patch status
      project:
        default: false  # disable the default status that measures entire project
        tests:  # declare a new status context "tests"
          target: 90%  # set target to 90%
          paths: 
            - nextjs/src/helpers/
            - nextjs/src/lib/
          flags: 
            - unitTests

  # Ignore directories other than nextjs
  ignore:
    - "rust/**/*"
    - "instruction.md"
    - "*.md"
    - "react-design-pattern.code-workspace"
  
  # Coverage precision
  # precision: 2
  # round: down
  # range: "70...100"

# Comment configuration for PR comments
comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false  # if true: only post the comment if coverage changes
  require_base: false        # [yes :: must have a base report to post]
  require_head: true       # [yes :: must have a head report to post]

