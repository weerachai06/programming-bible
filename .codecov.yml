# Codecov Configuration for NextJS Project
# This configuration targets only the nextjs directory with focus on helpers and lib

coverage:
  status:
    patch:
      default:
        target: 80%
        threshold: 1%
        paths: 
          - nextjs/src/helpers/
          - nextjs/src/lib/
          - nextjs/src/features/**/helpers/
        flags:
          - nextjs-unit-tests
    project:
      default: false  # disable the default status that measures entire project
      nextjs:  # declare a new status context for NextJS
        target: 85%  # set target to 85%
        threshold: 1%
        paths: 
          - nextjs/src/helpers/
          - nextjs/src/lib/
          - nextjs/src/features/**/helpers/
        flags: 
          - nextjs-unit-tests
        if_ci_failed: error  # Fail if CI failed
        informational: false  # This status will block PR if coverage drops

  # Ignore directories other than nextjs
  ignore:
    - "rust/**/*"
    - "instruction.md"
    - "*.md"
    - "react-design-pattern.code-workspace"
    - "nextjs/public/**/*"
    - "nextjs/scripts/**/*"
    - "nextjs/.next/**/*"
    - "nextjs/coverage/**/*"
    - "nextjs/node_modules/**/*"
    - "nextjs/**/*.config.*"
    - "nextjs/**/*.d.ts"
    - "nextjs/test/**/*"
    - "nextjs/**/*.test.*"
    - "nextjs/**/*.spec.*"

# Flags to organize test suites
flags:
  nextjs-unit-tests:
    paths:
      - nextjs/src/helpers/
      - nextjs/src/lib/
      - nextjs/src/features/**/helpers/

# PR comment configuration
comment:
  layout: "header, diff, flags, components, footer"
  behavior: default
  require_changes: false  # Always post comment regardless of coverage changes
  require_base: false     # Don't require base report
  require_head: true      # Require head report
  show_carryforward_flags: true
  
  # Custom footer with project context
  after_n_files: 10  # Show individual file coverage for first 10 files
  
components:
  - component_id: nextjs-helpers
    name: "NextJS Helpers"
    paths:
      - nextjs/src/helpers/**
      - nextjs/src/features/**/helpers/**
    
  - component_id: nextjs-lib  
    name: "NextJS Lib"
    paths:
      - nextjs/src/lib/**
